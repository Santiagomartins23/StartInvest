name: startinvest
description: Plataforma gamificada de educação financeira.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Dependency Injection
  get_it: ^8.0.0
  injectable: ^2.4.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # Google Sign In
  google_sign_in: ^6.2.1

  # HTTP / API
  dio: ^5.7.0

  # Local Storage / Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.69.0

  # UI / Animations
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
