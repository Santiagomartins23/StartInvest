name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes e Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Verificar formatação
        run: dart format --check lib

      - name: Análise estática
        run: flutter analyze

      - name: Rodar testes
        run: flutter test --coverage || true

      - name: Build Web
        run: flutter build web --no-wasm-dry-run --release
